<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LatysTime — Магазин сервера</title>
    <style>
        /* ===== ОБЩИЕ СБРОСЫ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0b0a0e;
            color: #f0e6d3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 30% 20%, #1f1033 0%, #0b0a0e 85%);
            padding: 20px 10px;
        }

        /* ===== ЛЕТАЮЩИЕ ПРИЗРАКИ ===== */
        .floating-ghosts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ghost {
            position: absolute;
            font-size: 34px;
            opacity: 0.12;
            animation: floatGhost linear infinite;
            color: #b388ff;
        }

        .ghost:nth-child(1) { top: 5%; left: 3%; animation-duration: 20s; font-size: 46px; }
        .ghost:nth-child(2) { top: 80%; left: 88%; animation-duration: 24s; font-size: 38px; }
        .ghost:nth-child(3) { top: 45%; left: 95%; animation-duration: 28s; font-size: 56px; }
        .ghost:nth-child(4) { top: 90%; left: 5%; animation-duration: 22s; font-size: 32px; }
        .ghost:nth-child(5) { top: 30%; left: 55%; animation-duration: 30s; font-size: 48px; }

        @keyframes floatGhost {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -25px) rotate(6deg); }
            50% { transform: translate(-15px, -40px) rotate(-6deg); }
            75% { transform: translate(25px, -20px) rotate(4deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* ===== ОСНОВНОЙ КОНТЕЙНЕР ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            width: 100%;
        }

        .glass-card {
            background: rgba(18, 14, 28, 0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 165, 0, 0.15);
            border-radius: 40px;
            padding: 45px 35px;
            margin-bottom: 35px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            transition: 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 165, 0, 0.3);
            box-shadow: 0 30px 70px rgba(179, 136, 255, 0.08);
        }

        /* ===== ЗАГОЛОВКИ ===== */
        h1 {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #ffab40, #ff6f00, #b388ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffcc80;
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid rgba(255, 165, 0, 0.15);
            padding-bottom: 12px;
        }

        /* ===== IP И КНОПКА КОПИРОВАНИЯ ===== */
        .ip-block {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 15px 0 10px;
        }

        .ip-address {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 165, 0, 0.2);
            border-radius: 60px;
            padding: 14px 30px;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            color: #ffcc80;
            letter-spacing: 2px;
        }

        .btn-copy {
            background: linear-gradient(145deg, #ff8a65, #e65100);
            border: none;
            padding: 14px 38px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 800;
            color: #0b0a0e;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 6px 20px rgba(255, 165, 0, 0.25);
        }

        .btn-copy:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 165, 0, 0.45);
        }

        /* ===== СЕТКА КАРТОЧЕК ТОВАРОВ ===== */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 22px;
            margin-top: 10px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 165, 0, 0.08);
            border-radius: 24px;
            padding: 22px 16px 20px;
            text-align: center;
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: #b388ff;
            box-shadow: 0 12px 28px rgba(179, 136, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }

        .product-card .name {
            font-size: 22px;
            font-weight: 800;
            color: #ffe0b2;
            margin-bottom: 8px;
        }

        .product-card .price {
            font-size: 22px;
            font-weight: 700;
            color: #b388ff;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .btn-buy {
            background: transparent;
            border: 2px solid #b388ff;
            color: #b388ff;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            max-width: 160px;
            margin-top: auto;
        }

        .btn-buy:hover {
            background: #b388ff;
            color: #0b0a0e;
            box-shadow: 0 0 20px rgba(179, 136, 255, 0.25);
        }

        /* ===== ОНЛАЙН СТАТИСТИКА ===== */
        .online-block {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 60px;
            padding: 12px 28px;
            border: 1px solid rgba(255, 165, 0, 0.06);
            margin: 20px 0 5px;
        }

        .online-dot {
            width: 14px;
            height: 14px;
            background: #66bb6a;
            border-radius: 50%;
            animation: pulse 1.6s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        .online-number {
            font-size: 32px;
            font-weight: 800;
            color: #66bb6a;
        }

        .online-label {
            font-size: 15px;
            color: #9575cd;
            letter-spacing: 1px;
        }

        /* ===== ПОДВАЛ ===== */
        .footer {
            text-align: center;
            color: #4a3f5e;
            font-size: 14px;
            padding: 15px 0 5px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 10px;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 700px) {
            h1 { font-size: 34px; }
            .glass-card { padding: 28px 16px; }
            .ip-address { font-size: 16px; padding: 12px 18px; }
            .btn-copy { font-size: 15px; padding: 12px 22px; }
            .shop-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 15px; }
            .product-card .name { font-size: 18px; }
            .product-card .price { font-size: 18px; }
            .section-title { font-size: 22px; }
            .online-number { font-size: 26px; }
        }

        @media (max-width: 450px) {
            .shop-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .product-card { padding: 16px 10px; }
            .btn-buy { font-size: 13px; padding: 8px 14px; }
        }
    </style>
</head>
<body>

    <!-- ===== ПРИЗРАКИ ===== -->
    <div class="floating-ghosts">
        <div class="ghost">👻</div>
        <div class="ghost">🎃</div>
        <div class="ghost">💀</div>
        <div class="ghost">🦇</div>
        <div class="ghost">🧙</div>
    </div>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <div class="container">

        <!-- ШАПКА С IP -->
        <div class="glass-card">
            <h1>⚡ LatysTime</h1>

            <div class="ip-block">
                <div class="ip-address" id="serverIp">mc-latysTime.ru</div>
                <button class="btn-copy" onclick="copyIP()">📋 Копировать IP</button>
            </div>

            <div class="online-block">
                <div class="online-dot"></div>
                <div class="online-number" id="onlineCount">0</div>
                <div class="online-label">игроков онлайн</div>
            </div>
        </div>

        <!-- ПРИВИЛЕГИИ -->
        <div class="glass-card">
            <div class="section-title">👑 Привилегии</div>
            <div class="shop-grid" id="privilegesList"></div>
        </div>

        <!-- УСЛУГИ -->
        <div class="glass-card">
            <div class="section-title">🎃 Услуги и товары</div>
            <div class="shop-grid" id="servicesList"></div>
        </div>

        <!-- ПОДВАЛ -->
        <div class="footer">
            <div style="font-size:13px;">© 2026 LatysTime — Все права защищены</div>
        </div>

    </div>

    <script>
        // ===== ТОВАРЫ =====
        const privileges = [
            { name: 'Элита', price: 250 },
            { name: 'Титан', price: 300 },
            { name: 'Принц', price: 600 },
            { name: 'Князь', price: 900 },
            { name: 'Герцог', price: 1700 }
        ];

        const services = [
            { name: 'Кейс с токенами', price: 15 },
            { name: 'Монетный ключ', price: 10 },
            { name: 'Размут', price: 80 },
            { name: 'Разбан', price: 150 },
            { name: 'Восстановление прав', price: 400 }
        ];

        // ===== ОТРИСОВКА КАРТОЧЕК =====
        function renderShop(containerId, items) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="name">${item.name}</div>
                    <div class="price">${item.price} ₽</div>
                    <button class="btn-buy" onclick="buyItem('${item.name}', ${item.price})">Купить</button>
                `;
                container.appendChild(card);
            });
        }

        // ===== КНОПКА "КУПИТЬ" =====
        function buyItem(name, price) {
            alert(`🧛 Товар "${name}" (${price} ₽)\nСкоро здесь будет оплата!`);
        }

        // ===== КНОПКА "КОПИРОВАТЬ IP" =====
        function copyIP() {
            const ip = document.getElementById('serverIp').innerText;
            navigator.clipboard.writeText(ip).then(() => {
                alert('✅ IP скопирован: ' + ip);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = ip;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ IP скопирован: ' + ip);
            });
        }

        // ===== СИМУЛЯЦИЯ ОНЛАЙНА =====
        function updateOnline() {
            const count = Math.floor(Math.random() * 45) + 5;
            document.getElementById('onlineCount').textContent = count;
        }

        // ===== ЗАПУСК =====
        renderShop('privilegesList', privileges);
        renderShop('servicesList', services);
        updateOnline();
        setInterval(updateOnline, 30000);
    </script>
</body>
</html>
